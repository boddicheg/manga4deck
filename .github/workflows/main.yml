name: compile

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-manga4deck:
    name: Build Manga4Deck
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libfuse2 \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            wget

      - name: Build Manga4Deck binary
        run: cargo build --manifest-path src-native/Cargo.toml --release

      - name: Create AppDir
        run: |
          set -eux
          VERSION="$(grep '^version =' src-native/Cargo.toml | head -n1 | cut -d '"' -f2)"
          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps

          cp src-native/target/release/manga4deck AppDir/usr/bin/manga4deck
          cp src-native/icons/128x128.png AppDir/usr/share/icons/hicolor/128x128/apps/manga4deck.png

          cat > AppDir/usr/share/applications/manga4deck.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Manga4Deck
          Comment=Manga and manhwa reader for Steam Deck
          Exec=manga4deck
          Icon=manga4deck
          Categories=Graphics;Viewer;
          Terminal=false
          EOF

      - name: Build AppImage
        run: |
          set -eux
          wget -O linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/manga4deck \
            --desktop-file AppDir/usr/share/applications/manga4deck.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/128x128/apps/manga4deck.png \
            --output appimage

          mkdir -p artifacts
          APPIMAGE="$(find . -maxdepth 1 -type f -name '*.AppImage' ! -name 'linuxdeploy-x86_64.AppImage' -print -quit)"
          mv "$APPIMAGE" "artifacts/Manga4Deck-${APP_VERSION}-x86_64.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Manga4Deck-AppImage
          path: artifacts/*.AppImage
